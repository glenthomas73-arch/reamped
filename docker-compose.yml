version: '3.9'

services:
  postgres:
      image: postgres:16-alpine
          container_name: reamped_postgres
              environment:
                    POSTGRES_DB: reamped
                          POSTGRES_USER: postgres
                                POSTGRES_PASSWORD: password
                                    ports:
                                          - '5432:5432'
                                              volumes:
                                                    - postgres_data:/var/lib/postgresql/data
                                                          - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
                                                              healthcheck:
                                                                    test: ['CMD-SHELL', 'pg_isready -U postgres']
                                                                          interval: 10s
                                                                                timeout: 5s
                                                                                      retries: 5

                                                                                        redis:
                                                                                            image: redis:7-alpine
                                                                                                container_name: reamped_redis
                                                                                                    ports:
                                                                                                          - '6379:6379'
                                                                                                              volumes:
                                                                                                                    - redis_data:/data
                                                                                                                        healthcheck:
                                                                                                                              test: ['CMD', 'redis-cli', 'ping']
                                                                                                                                    interval: 10s
                                                                                                                                          timeout: 5s
                                                                                                                                                retries: 3
                                                                                                                                                
                                                                                                                                                  backend:
                                                                                                                                                      build:
                                                                                                                                                            context: ./backend
                                                                                                                                                                  dockerfile: Dockerfile
                                                                                                                                                                      container_name: reamped_backend
                                                                                                                                                                          ports:
                                                                                                                                                                                - '3001:3001'
                                                                                                                                                                                    environment:
                                                                                                                                                                                          NODE_ENV: development
                                                                                                                                                                                                DATABASE_URL: postgresql://postgres:password@postgres:5432/reamped
                                                                                                                                                                                                      REDIS_URL: redis://redis:6379
                                                                                                                                                                                                          env_file:
                                                                                                                                                                                                                - ./backend/.env
                                                                                                                                                                                                                    depends_on:
                                                                                                                                                                                                                          postgres:
                                                                                                                                                                                                                                  condition: service_healthy
                                                                                                                                                                                                                                        redis:
                                                                                                                                                                                                                                                condition: service_healthy
                                                                                                                                                                                                                                                    volumes:
                                                                                                                                                                                                                                                          - ./backend:/app
                                                                                                                                                                                                                                                                - /app/node_modules
                                                                                                                                                                                                                                                                    command: npm run dev
                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                      frontend:
                                                                                                                                                                                                                                                                          build:
                                                                                                                                                                                                                                                                                context: ./frontend
                                                                                                                                                                                                                                                                                      dockerfile: Dockerfile
                                                                                                                                                                                                                                                                                          container_name: reamped_frontend
                                                                                                                                                                                                                                                                                              ports:
                                                                                                                                                                                                                                                                                                    - '3000:3000'
                                                                                                                                                                                                                                                                                                        environment:
                                                                                                                                                                                                                                                                                                              REACT_APP_API_URL: http://localhost:3001
                                                                                                                                                                                                                                                                                                                  depends_on:
                                                                                                                                                                                                                                                                                                                        - backend
                                                                                                                                                                                                                                                                                                                            volumes:
                                                                                                                                                                                                                                                                                                                                  - ./frontend:/app
                                                                                                                                                                                                                                                                                                                                        - /app/node_modules
                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                        volumes:
                                                                                                                                                                                                                                                                                                                                          postgres_data:
                                                                                                                                                                                                                                                                                                                                            redis_data:
